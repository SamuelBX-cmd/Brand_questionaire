    const DIMENSIONS = [
      {
        id: "decision",
        label: "Decision Making",
        questions: [
          { id: 1, text: "When a significant brand decision needs to be made, who has the final say — and how many people are involved in getting there?", prompt: "THIS IS ABOUT ACCOUNTABILITY, NOT HEADCOUNT." },
          { id: 2, text: "Is there a named executive sponsor for your brand — and how actively are they involved in day-to-day decisions?", prompt: "NOT THE PERSON ON THE INTRANET PAGE. THE REAL ONE." },
          { id: 3, text: "How often does organisational complexity slow down or dilute brand outcomes?", prompt: "BE HONEST ABOUT THE REAL COST." },
        ]
      },
      {
        id: "culture",
        label: "Culture & Behaviour",
        questions: [
          { id: 4, text: "How would a new employee describe your culture after 90 days — and how does that compare to what leadership would say?", prompt: "WHAT WOULD THEY ACTUALLY SAY?" },
          { id: 5, text: "When things go wrong internally, what's the default response: fix it quietly, escalate it, or learn from it openly?", prompt: "THINK ABOUT THE LAST TIME SOMETHING ACTUALLY WENT WRONG." },

        ]
      },
      {
        id: "commercial",
        label: "Commercial Connection",
        questions: [
          { id: 7, text: "How does your senior leadership team connect brand investment to business performance — revenue, retention, acquisition?", prompt: "DO THEY ACTUALLY MAKE THIS CONNECTION?" },
          { id: 8, text: "When design, marketing, or experience decisions are made, who's at the table — and are commercial outcomes part of the conversation?", prompt: "THE TABLE TELLS YOU EVERYTHING." },
          { id: 9, text: "How comfortable is your leadership team talking about brand as a driver of long-term business value — not just aesthetics?", prompt: "THIS IS THE REAL TEST OF BRAND MATURITY." },
        ]
      },
      {
        id: "alignment",
        label: "Alignment & Change",
        questions: [
          { id: 10, text: "What impact does your work have on teams outside your own — upstream and downstream?", prompt: "THINK UPSTREAM AND DOWNSTREAM." },
          { id: 11, text: "Can you name a recent decision made in one team that created friction or rework for another?", prompt: "IF YOU CAN NAME IT IMMEDIATELY, THAT'S DATA." },
          { id: 12, text: "When your organisation introduces significant change, how do people typically first hear about it?", prompt: "HOW PEOPLE FIND OUT TELLS YOU HOW MUCH THEY'RE TRUSTED." },
          { id: 13, text: "After a change is implemented, what does follow-through look like — and how is adoption actually measured?", prompt: "LAUNCH IS NOT THE FINISH LINE." },
        ]
      },
      {
        id: "consistency",
        label: "Brand Consistency",
        questions: [
          { id: 14, text: "How does your marketing team receive and activate brand guidance — and how consistent is the output across campaigns?", prompt: "THE OUTPUT DOESN'T LIE." },
          { id: 15, text: "How often does your tone of voice, visual identity, or messaging feel noticeably different across channels?", prompt: "THINK ABOUT YOUR LAST AUDIT. OR DO ONE NOW." },
          { id: 16, text: "Where in your customer's experience does your brand feel most inconsistent — or most absent?", prompt: "YOU PROBABLY ALREADY KNOW THE ANSWER." },
        ]
      },
      {
        id: "real-world",
        label: "Brand in the Real World",
        questions: [
          { id: 17, text: "Are you tracking how AI tools — search engines, chatbots, recommendation engines — describe your brand, and is your content structured so they can accurately represent you?", prompt: "MOST HAVEN'T. BE HONEST." },
          { id: 18, text: "Has your brand ever promised something the business couldn't deliver — and what happened?", prompt: "EVERY BRAND HAS A STORY LIKE THIS." },
          { id: 19, text: "If you were a customer, where would you feel the gap between what your brand says and what it actually does?", prompt: "THE HONEST ANSWER IS THE USEFUL ONE." },
        ]
      }
    ];

    const ALL_QUESTIONS = DIMENSIONS.flatMap((d, di) =>
      d.questions.map((q, qi) => ({ ...q, dimensionId: d.id, dimensionLabel: d.label, dimensionIndex: di, indexInDimension: qi }))
    );
    const TOTAL = ALL_QUESTIONS.length;

    const SCORE_LABELS = ["", "Very low", "Low", "Mixed", "Strong", "Very strong"];

    const getDimensionScore = (answers, dimensionId) => {
      const dim = DIMENSIONS.find(d => d.id === dimensionId);
      const scores = dim.questions.map(q => answers[q.id]).filter(Boolean);
      if (!scores.length) return 0;
      return Math.round((scores.reduce((a, b) => a + b, 0) / scores.length) * 10) / 10;
    };

    const getRAG = (score) => {
      if (score >= 4) return { color: "#4ade80", label: "Strong", bg: "rgba(74,222,128,0.1)" };
      if (score >= 3) return { color: "#f59e0b", label: "Developing", bg: "rgba(245,158,11,0.1)" };
      return { color: "#f87171", label: "Needs attention", bg: "rgba(248,113,113,0.1)" };
    };

    function BrandDiagnostic() {
      const [stage, setStage] = useState("intro");
      const [current, setCurrent] = useState(0);
      const [answers, setAnswers] = useState({});
      const [hoveredScore, setHoveredScore] = useState(null);
      const [animating, setAnimating] = useState(false);
      const [orgName, setOrgName] = useState("");
      const [responderName, setResponderName] = useState("");

      const q = ALL_QUESTIONS[current];
      const progress = (current / TOTAL) * 100;
      const answered = answers[q && q.id];

      const select = (score) => {
        if (animating) return;
        setAnswers(prev => ({ ...prev, [q.id]: score }));
        setAnimating(true);
        setTimeout(() => {
          if (current + 1 < TOTAL) {
            setCurrent(c => c + 1);
          } else {
            setStage("results");
          }
          setAnimating(false);
        }, 320);
      };

      const dimScores = DIMENSIONS.map(d => ({
        subject: d.label,
        score: getDimensionScore(answers, d.id),
        id: d.id
      }));

      const overallScore = dimScores.reduce((a, b) => a + b.score, 0) / dimScores.length;

                        placeholder="Company name"
                        value={orgName}
                        onChange={e => setOrgName(e.target.value)}
                      />
                    </div>
                    <div className="bd-field">
                      <label>Your name</label>
                      <input
                        type="text"
                        placeholder="Optional"
                        value={responderName}
                        onChange={e => setResponderName(e.target.value)}
                      />
                    </div>
                  </div>
                  <button className="bd-btn" onClick={() => setStage("question")}>
                    Start the check <span className="bd-btn-arrow">→</span>
                  </button>
                </div>
              </div>
            )}

            {/* QUESTION */}
            {stage === "question" && q && (
              <div className="bd-question">
                <div className={`bd-q-inner ${animating ? "exit" : ""}`}>
                  <div className="bd-dim-tag">
                    <div className="bd-dim-dot" />
                    {q.dimensionLabel}
                  </div>
                  <h2 className="bd-q-text">{q.text}</h2>
                  <p className="bd-q-prompt">{q.prompt}</p>
                  <div className="bd-scale">
                    <div className="bd-scale-labels">
                      <span className="bd-scale-label">Not at all</span>
                      <span className="bd-scale-label">Completely</span>
                    </div>
                    <div className="bd-scale-btns">
                      {[1, 2, 3, 4, 5].map(score => (
                        <button
                          key={score}
                          className={`bd-scale-btn ${answered === score ? "selected" : ""} ${hoveredScore === score ? "hov" : ""}`}
                          onClick={() => select(score)}
                          onMouseEnter={() => setHoveredScore(score)}
                          onMouseLeave={() => setHoveredScore(null)}
                        >
                          {score}
                          {(hoveredScore === score || answered === score) && (
                            <span className="bd-scale-sublabel">{SCORE_LABELS[score]}</span>
                          )}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className="bd-nav">
                    {current > 0 ? (
                      <button className="bd-back" onClick={() => setCurrent(c => c - 1)}>← Back</button>
                    ) : <span />}
                    <button className="bd-skip" onClick={() => {
                      if (current + 1 < TOTAL) setCurrent(c => c + 1);
                      else setStage("results");
                    }}>Skip</button>
                  </div>
                </div>
              </div>
            )}

            {/* RESULTS */}
            {stage === "results" && (
              <div className="bd-results">
                <div className="bd-results-header">
                  {orgName && <div className="bd-results-name">{orgName}</div>}
                  <div className="bd-results-headline">
                    Your brand reality check
                  </div>
                  <div className="bd-results-overall">
                    <div className="bd-overall-score">{overallScore.toFixed(1)}</div>
                    <div className="bd-overall-label">
                      Overall score<br />
                      <span style={{ color: getRAG(overallScore).color }}>{getRAG(overallScore).label}</span>
                      {" "}across all 6 dimensions
                    </div>
                  </div>
                </div>

                <div className="bd-radar-section">
                  <div className="bd-section-label">Dimension overview</div>
                  <ResponsiveContainer width="100%" height={280}>
                    <RadarChart data={dimScores}>
                      <PolarGrid stroke="rgba(255,255,255,0.08)" />
                      <PolarAngleAxis
                        dataKey="subject"
                        tick={{ fill: "rgba(232,230,225,0.45)", fontSize: 11, fontFamily: "'Outfit', sans-serif" }}
                      />
                      <Radar
                        name="Score"
                        dataKey="score"
                        stroke="#00ac42"
                        fill="#00ac42"
                        fillOpacity={0.15}
                        strokeWidth={2}
                        dot={{ fill: "#00ac42", r: 3 }}
                      />
                    </RadarChart>
                  </ResponsiveContainer>
                </div>

                <div className="bd-grid">
                  {dimScores.map((dim) => {
                    const rag = getRAG(dim.score);
                    const pct = (dim.score / 5) * 100;
                    return (
                      <div key={dim.id} className="bd-dim-card">
                        <div className="bd-dim-card-header">
                          <div className="bd-dim-name">{dim.subject}</div>
                          <div className="bd-dim-score-badge" style={{ color: rag.color }}>
                            {dim.score.toFixed(1)}
                          </div>
                        </div>
                        <div className="bd-dim-bar-track">
                          <div
                            className="bd-dim-bar-fill"
                            style={{ width: `${pct}%`, background: rag.color }}
                          />
                        </div>
                        <span
                          className="bd-dim-rag"
                          style={{ color: rag.color, background: rag.bg }}
                        >
                          {rag.label}
                        </span>
                      </div>
                    );
                  })}
                </div>

                <div className="bd-cta">
                  <div>
                    <div className="bd-cta-text">
                      There's more behind these numbers.
                    </div>
                    <div className="bd-cta-sub">
                      This snapshot surfaces where your brand's real constraints are.<br />
                      The next conversation is where we go deeper.
                    </div>
                  </div>
                  <div style={{ textAlign: "center", flexShrink: "0" }}>
                    <a className="bd-btn" href="mailto:hello@futurebrand.com">
                      Book a conversation <span className="bd-btn-arrow">→</span>
                    </a>
                  </div>
                </div>

                <div style={{ textAlign: "center", marginTop: "24px" }}>
                  <button className="bd-restart" onClick={() => {
                    setStage("intro");
                    setCurrent(0);
                    setAnswers({});
                    setOrgName("");
                    setResponderName("");
                  }}>Start again</button>
                </div>
              </div>
            )}

          </div>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<BrandDiagnostic />);
  </script>
</body>
</html>
